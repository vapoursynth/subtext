name: Build

on: [push, pull_request, workflow_dispatch]

jobs:
  build-non-windows-wheel:
    strategy:
      matrix:
        include:
        - arch: linux_x86_64
          runs-on: ubuntu-latest
        - arch: linux_aarch64
          runs-on: ubuntu-24.04-arm
        - arch: macosx_x86_64
          runs-on: macos-15-intel
        - arch: macosx_arm64
          runs-on: macos-15
      fail-fast: false

    runs-on: ${{ matrix.runs-on }}

    steps:
    - uses: actions/checkout@v6

    - uses: pypa/cibuildwheel@v3.4.0
      env:
        CIBW_BUILD: cp314-*
        CIBW_SKIP: cp314-musllinux*
        CIBW_BUILD_FRONTEND: uv
        CIBW_ENVIRONMENT_MACOS: MACOSX_DEPLOYMENT_TARGET=15
        CIBW_BEFORE_ALL_LINUX: >
          dnf -y install libass-devel nasm &&
          git clone https://git.ffmpeg.org/ffmpeg.git --branch n8.1 --depth 1 &&
          cd ffmpeg &&
          ./configure --enable-gpl --enable-version3 --disable-programs --disable-doc --disable-avdevice --disable-swresample --disable-swscale --disable-avfilter --disable-encoders --disable-muxers --enable-pic --disable-debug &&
          make -j$(nproc) &&
          make install -j$(nproc) &&
          cd .. &&
          rm -rf ffmpeg
        CIBW_BEFORE_ALL_MACOS: >
          brew install libass nasm &&
          git clone https://git.ffmpeg.org/ffmpeg.git --branch n8.1 --depth 1 &&
          cd ffmpeg &&
          ./configure --enable-gpl --enable-version3 --disable-programs --disable-doc --disable-avdevice --disable-swresample --disable-swscale --disable-avfilter --disable-encoders --disable-muxers --enable-pic --disable-debug &&
          make -j3 &&
          sudo make install -j3 &&
          cd .. &&
          rm -rf ffmpeg
      with:
        output-dir: dist
        extras: uv

    - name: Fix tag
      run: |
        cd dist
        for whl in *.whl; do
          pipx run wheel tags --remove --python-tag py3 --abi-tag none $whl
        done

    - uses: actions/upload-artifact@v7
      with:
        name: subtext-${{ matrix.arch }}
        path: dist

  build-windows-wheel:
    runs-on: windows-latest

    defaults:
      run:
        shell: msys2 {0}

    steps:
    - uses: actions/checkout@v6

    - uses: msys2/setup-msys2@v2
      with:
        msystem: CLANG64
        update: true
        install: >-
          mingw-w64-clang-x86_64-autotools
          mingw-w64-clang-x86_64-git
          mingw-w64-clang-x86_64-libass
          mingw-w64-clang-x86_64-nasm
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-uv

    - name: Install FFmpeg
      run: |
        git clone https://git.ffmpeg.org/ffmpeg.git --branch n8.1 --depth 1
        pushd ffmpeg
        ./configure --prefix=/clang64 --enable-gpl --enable-version3 --disable-programs --disable-doc --disable-avdevice --disable-swresample --disable-swscale --disable-avfilter --disable-encoders --disable-muxers --disable-nvenc --cc=clang --cxx=clang++ --pkg-config-flags=--static --enable-pic --disable-debug
        make install -j$(nproc)
        popd
        rm -rf ffmpeg

    - name: Build
      run: |
        uv build -Csetup-args="-Dprefer_static=true" -Csetup-args="-Dcpp_link_args=-static"

    - name: Fix tag
      run: |
        cd dist
        for whl in *.whl; do
          uvx wheel tags --remove --python-tag py3 --abi-tag none $whl
        done

    - uses: actions/upload-artifact@v7
      with:
        name: subtext-sdist
        path: dist/*.tar.gz

    - uses: actions/upload-artifact@v7
      with:
        name: subtext-win_amd64
        path: dist/*.whl

  publish:
    permissions:
      id-token: write
    needs: [build-non-windows-wheel, build-windows-wheel]
    if: ${{ startsWith(github.ref, 'refs/tags/R') }}
    runs-on: ubuntu-latest

    steps:
    - uses: actions/download-artifact@v8
      with:
        path: dist
        merge-multiple: true

    - uses: pypa/gh-action-pypi-publish@release/v1
